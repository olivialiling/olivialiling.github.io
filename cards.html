  <script>
    document.querySelectorAll('.masonry-grid img').forEach(img => {
      const show = () => img.style.opacity = '1';
      if (img.complete && img.naturalWidth > 0) {
        show();
      } else {
        img.addEventListener('load', show);
        img.addEventListener('error', show);
      }
    });
